<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字比對算法測試</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 24px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header {
      background: white;
      border-radius: 12px;
      padding: 20px 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    header h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 5px; }
    header p  { color: #888; font-size: 13px; }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .card-header h3 { font-size: 14px; color: #444; font-weight: 600; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: normal;
    }
    .badge-ori  { background: #e3f2fd; color: #1565c0; }
    .badge-new  { background: #e8f5e9; color: #2e7d32; }

    textarea {
      width: 100%;
      height: 230px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.75;
      resize: vertical;
      color: #333;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #4f9cf9;
      box-shadow: 0 0 0 3px rgba(79,156,249,0.12);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 18px 0;
    }

    .btn {
      padding: 10px 30px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .btn-primary   { background: #4f9cf9; color: white; }
    .btn-primary:hover { background: #2d7dd2; }
    .btn-secondary { background: #f0f0f0; color: #555; }
    .btn-secondary:hover { background: #e0e0e0; }

    /* ── Result Section ── */
    #resultCard { display: none; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  {
      width: 13px; height: 13px;
      border-radius: 3px;
      border: 1px solid;
      flex-shrink: 0;
    }

    .diff-output-wrapper {
      padding: 32px 20px 20px;
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow-x: auto;
    }

    /* ─── Core diff rendering ─── */
    .diff-output {
      font-size: 15px;
      line-height: 3em;        /* extra room for floating annotations */
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Wrapper for annotated spans */
    .dw {
      position: relative;
      display: inline-block;
    }

    /* Floating annotation bubble */
    .da {
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 2px;
      font-size: 11px;
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 1px 6px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 10;
      line-height: 1.5;
    }

    /* Replacement: yellow + strikethrough on original */
    .da-rep  { background: #fff3cd; border: 1px solid #ffc107; color: #664d03; }
    .dt-rep  { background: #fff3cd; border-radius: 3px; padding: 0 2px; border-bottom: 2px solid #f59e0b; }

    /* Addition: green */
    .da-add  { background: #d1fae5; border: 1px solid #34d399; color: #065f46; }
    .dt-add  { background: #d1fae5; border-radius: 3px; padding: 0 2px; border-bottom: 2px solid #34d399; }

    /* Deletion: red strikethrough inline */
    .dt-del  {
      background: #fee2e2; color: #9b1c1c;
      text-decoration: line-through;
      border-radius: 3px; padding: 0 2px;
      font-size: 0.87em; opacity: 0.85;
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 14px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
    }
    .stat-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }

    @media (max-width: 800px) {
      .input-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>文字比對算法測試頁</h1>
    <p>比較「簡介框」（原始）與「內容框」（改寫後）差異，標示替換 / 新增 / 刪除。兩個文字框皆可自由編輯。</p>
  </header>

  <div class="input-grid">
    <div class="card">
      <div class="card-header">
        <h3>簡介框</h3>
        <span class="badge badge-ori">原始</span>
      </div>
      <textarea id="introText" placeholder="輸入公司簡介（原始）文字..."></textarea>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>內容框</h3>
        <span class="badge badge-new">改寫後</span>
      </div>
      <textarea id="contentText" placeholder="輸入改寫後的內容..."></textarea>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="runDiff()">比對差異</button>
    <button class="btn btn-secondary" onclick="clearAll()">清除</button>
  </div>

  <div class="card" id="resultCard">
    <div class="card-header">
      <h3>比對結果</h3>
      <span id="timeBadge" class="badge" style="background:#e0e7ff;color:#3730a3;"></span>
    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot" style="background:#fff3cd;border-color:#ffc107;"></span>
        替換（上方泡泡顯示原始文字）
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#d1fae5;border-color:#34d399;"></span>
        新增（內容框多出的文字）
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#fee2e2;border-color:#f87171;"></span>
        刪除（原始有但內容框已移除，行內刪除線顯示）
      </div>
    </div>

    <div class="diff-output-wrapper">
      <div class="diff-output" id="diffOutput"></div>
    </div>

    <div class="stats-bar" id="statsBar"></div>
  </div>

</div>

<script>
// ============================================================
// 1. TOKENIZE
//    優先順序（長匹配優先）：
//    季度格式 4Q22 > 斜線數字 2023/24 > 純數字 > ASCII詞 >
//    中文字（單字）> 換行 > 空白序列 > 其他字元
// ============================================================
function tokenize(text) {
  const re = /\d+Q\d+|(?:\d+\/)+\d+|\d+(?:\.\d+)?|[a-zA-Z]+|\r?\n|[ \t]+|[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u2e80-\u2eff\u31c0-\u31ef\u3200-\u32ff\u3300-\u33ff\ufe30-\ufe4f\uff00-\uffef]|./gu;
  const tokens = [];
  let m;
  while ((m = re.exec(text)) !== null) tokens.push(m[0]);
  return tokens;
}

// ============================================================
// 2. LCS-BASED DIFF
//    回傳 ops 陣列，每個 op：{type:'equal'|'insert'|'delete', a?, b?}
// ============================================================
function computeDiff(aT, bT) {
  const m = aT.length, n = bT.length;

  // dp[i][j] = LCS length for aT[0..i-1], bT[0..j-1]
  const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = aT[i-1] === bT[j-1]
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }

  // Backtrack
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && aT[i-1] === bT[j-1]) {
      ops.unshift({ type: 'equal', a: aT[i-1], b: bT[j-1] });
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.unshift({ type: 'insert', b: bT[j-1] });
      j--;
    } else {
      ops.unshift({ type: 'delete', a: aT[i-1] });
      i--;
    }
  }
  return ops;
}

// ============================================================
// 3. GROUP OPS
//    把連續的 delete/insert（任意順序）合成 replace/insert/delete 組
// ============================================================
function groupOps(ops) {
  const groups = [];
  let i = 0;
  while (i < ops.length) {
    if (ops[i].type === 'equal') {
      let text = '';
      while (i < ops.length && ops[i].type === 'equal') { text += ops[i].b; i++; }
      groups.push({ type: 'equal', text });
    } else {
      let del = '', ins = '';
      // 收集所有連續的 del / ins（任意交錯順序）
      while (i < ops.length && ops[i].type !== 'equal') {
        if (ops[i].type === 'delete') del += ops[i].a;
        else                          ins += ops[i].b;
        i++;
      }
      if      (del && ins) groups.push({ type: 'replace', oldText: del, newText: ins });
      else if (del)        groups.push({ type: 'delete',  oldText: del });
      else if (ins)        groups.push({ type: 'insert',  newText: ins });
    }
  }
  return groups;
}

// ============================================================
// 3b. POST-PROCESS GROUPS
//    修正 LCS 次優路徑：delete + equal(僅空白) + insert → replace
//    原因：空白 token 有多個相同候選，LCS tie-breaking 有時會把
//    空白插在 delete/insert 之間，阻止合併。
// ============================================================
function postProcessGroups(groups) {
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = 0; i < groups.length - 2; i++) {
      const a = groups[i], b = groups[i+1], c = groups[i+2];
      const isWsOnly = b.type === 'equal' && /^\s+$/.test(b.text);
      // delete ─ equal(ws) ─ insert
      if (a.type === 'delete' && isWsOnly && c.type === 'insert') {
        groups.splice(i, 3, { type: 'replace', oldText: a.oldText + b.text, newText: c.newText });
        changed = true; break;
      }
      // insert ─ equal(ws) ─ delete
      if (a.type === 'insert' && isWsOnly && c.type === 'delete') {
        groups.splice(i, 3, { type: 'replace', oldText: c.oldText + b.text, newText: a.newText });
        changed = true; break;
      }
    }
  }
  return groups;
}

// ============================================================
// 4. RENDER HTML
// ============================================================
function esc(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

// 標注泡泡文字截斷（避免過長）
function abbrev(t, max = 40) {
  return t.length > max ? t.slice(0, max) + '…' : t;
}

const WS_ONLY = /^\s+$/;

function renderGroups(groups) {
  let html = '';
  const stats = { replaced: 0, added: 0, deleted: 0 };

  for (const g of groups) {
    switch (g.type) {
      case 'equal':
        html += esc(g.text);
        break;

      case 'replace': {
        const oldTrimmed = g.oldText.trim();
        const newTrimmed = g.newText.trim();
        // 兩端都是空白 → 視為 equal
        if (!oldTrimmed && !newTrimmed) { html += esc(g.newText); break; }
        // 去空白後相同 → equal
        if (oldTrimmed === newTrimmed)  { html += esc(g.newText); break; }
        // oldText 純空白（空格 → 有意義文字）→ 視為「新增」，不顯示(空白)泡泡
        if (!oldTrimmed) {
          stats.added++;
          html +=
            `<span class="dw">` +
              `<span class="da da-add">＋新增</span>` +
              `<span class="dt-add">${esc(g.newText)}</span>` +
            `</span>`;
          break;
        }
        // newText 純空白（有意義文字 → 空格）→ 視為「刪除」
        if (!newTrimmed) {
          stats.deleted++;
          html += `<span class="dt-del">${esc(g.oldText.trim())}</span>`;
          break;
        }
        // 一般替換：泡泡顯示原始文字（刪除線）
        stats.replaced++;
        html +=
          `<span class="dw">` +
            `<span class="da da-rep">${esc(abbrev(oldTrimmed))}</span>` +
            `<span class="dt-rep">${esc(g.newText)}</span>` +
          `</span>`;
        break;
      }

      case 'insert':
        // 空白字元新增（換行、空格）→ 直接輸出，不顯示泡泡
        if (WS_ONLY.test(g.newText)) {
          html += esc(g.newText);
          break;
        }
        stats.added++;
        html +=
          `<span class="dw">` +
            `<span class="da da-add">＋新增</span>` +
            `<span class="dt-add">${esc(g.newText)}</span>` +
          `</span>`;
        break;

      case 'delete':
        // 空白字元刪除（空格、換行）→ 靜默忽略，不顯示紅色刪除線
        if (WS_ONLY.test(g.oldText)) break;
        stats.deleted++;
        html += `<span class="dt-del">${esc(g.oldText)}</span>`;
        break;
    }
  }
  return { html, stats };
}

// ============================================================
// 5. MAIN
// ============================================================
function runDiff() {
  const introText   = document.getElementById('introText').value;
  const contentText = document.getElementById('contentText').value;

  if (!introText.trim() || !contentText.trim()) {
    alert('請在兩個文字框中輸入內容再比對');
    return;
  }

  const t0 = performance.now();

  const aT = tokenize(introText);
  const bT = tokenize(contentText);
  const ops    = computeDiff(aT, bT);
  const groups = postProcessGroups(groupOps(ops));
  const { html, stats } = renderGroups(groups);

  const ms = (performance.now() - t0).toFixed(1);

  document.getElementById('diffOutput').innerHTML = html;

  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';

  document.getElementById('timeBadge').textContent = `耗時 ${ms} ms`;

  document.getElementById('statsBar').innerHTML =
    `<span><span class="stat-dot" style="background:#f59e0b;"></span>替換 <strong>${stats.replaced}</strong> 處</span>` +
    `<span><span class="stat-dot" style="background:#34d399;"></span>新增 <strong>${stats.added}</strong> 處</span>` +
    `<span><span class="stat-dot" style="background:#f87171;"></span>刪除 <strong>${stats.deleted}</strong> 處</span>` +
    `<span style="margin-left:auto;color:#bbb;">簡介框 ${aT.length} tokens → 內容框 ${bT.length} tokens</span>`;

  rc.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearAll() {
  document.getElementById('introText').value   = '';
  document.getElementById('contentText').value = '';
  document.getElementById('resultCard').style.display = 'none';
}

// ── 預填樣本文字（可直接修改） ──

document.getElementById('contentText').value =

</script>
