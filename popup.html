<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT 文字重寫</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="SettingsIO/settings-io.css">
</head>
<body>
  <div class="main-tab-container">
    <div class="main-tab active" data-tab="rewrite">AI</div>
    <div class="main-tab" data-tab="translate">翻譯</div>
    <div class="main-tab" data-tab="multiple-generation">多重生成</div>
    <div class="main-tab" data-tab="highlight">高亮</div>
    <div class="main-tab" data-tab="auto-replace">替換</div>
    <div class="main-tab" data-tab="stock">股票</div>
    <div class="main-tab" data-tab="sync">同步</div>
    <div class="main-tab" data-tab="settings">設定</div>
  </div>

  <!-- AI -->
  <div id="rewrite-tab" class="main-tab-content active">
    <div class="content">
      <div class="tab-container">
        <div class="tab active" data-tab="full">全文改寫</div>
        <div class="tab" data-tab="short">10字內改寫</div>
        <div class="tab" data-tab="auto">雙擊改寫</div>
        <div class="tab" data-tab="summary">關鍵要點</div>
        <div class="tab" data-tab="code-check">代號檢查</div>
      </div>
      
      <div id="full-tab" class="tab-content active">
        <select id="fullRewriteModel" class="model-select">
        </select>
        <textarea id="instruction" placeholder="輸入全文改寫要求"></textarea>
      </div>
      
      <div id="short-tab" class="tab-content">
        <select id="shortRewriteModel" class="model-select">
        </select>
        <textarea id="shortInstruction" placeholder="輸入10個字以下改寫要求"></textarea>
      </div>
      
      <div id="auto-tab" class="tab-content">
        <select id="autoRewriteModel" class="model-select">
        </select>
        <textarea id="autoRewritePatterns" placeholder="輸入反白自動改寫匹配模式"></textarea>
      </div>

      <div id="summary-tab" class="tab-content">
        <select id="summaryModel" class="model-select">
        </select>
        <textarea id="summaryInstruction" placeholder="輸入關鍵要點總結要求"></textarea>
      </div>

      <div id="code-check-tab" class="tab-content">
        <select id="codeCheckModel" class="model-select">
        </select>
        <textarea id="codeCheckInstruction" placeholder="輸入代號檢查要求"></textarea>
      </div>
      
      <button id="rewrite">改寫文字</button>
    </div>
  </div>

  <!-- 翻譯 -->
  <div id="translate-tab" class="main-tab-content">
    <div class="content">
      <div class="translate-container">
        <div class="tab-container">
          <div class="tab active" data-tab="translate">初始翻譯</div>
          <div class="tab" data-tab="reflect">反思</div>
          <div class="tab" data-tab="optimize">優化</div>
          <div class="tab" data-tab="zh-en-mapping">中英對照</div>
        </div>

        <div id="translate-content" class="tab-content active">
          <select id="translateModel" class="model-select">
          </select>
          <textarea id="translateInstruction" placeholder="輸入翻譯要求"></textarea>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="removeHash">
              <span>刪除##</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="removeStar">
              <span>刪除**</span>
            </label>
          </div>
        </div>

        <div id="reflect-content" class="tab-content">
          <select id="reflectModel" class="model-select">
          </select>
          <textarea id="reflectInstruction" placeholder="輸入翻譯反思要求"></textarea>
        </div>

        <div id="optimize-content" class="tab-content">
          <select id="optimizeModel" class="model-select">
          </select>
          <textarea id="optimizeInstruction" placeholder="輸入翻譯優化要求"></textarea>
        </div>

        <div id="zh-en-mapping-content" class="tab-content">
          <textarea id="zhEnMapping" placeholder="請輸入中英對照表，每行一個對照
例如：
台積電 = TSMC
鴻海 = Foxconn
營業額 = Revenue"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- 多重生成 -->
  <div id="multiple-generation-tab" class="main-tab-content">
    <div class="content">
      <div class="multiple-generation-container">
        <div class="input-group">
          <select id="generation-settings-select" class="model-select">
            <option value="">選擇設定組合</option>
          </select>
          <button id="add-generation-settings" class="settings-button square-button" title="新增">
            <span class="icon">+</span>
          </button>
          <button id="edit-generation-settings" class="settings-button square-button" title="修改">
            <span class="icon">✎</span>
          </button>
          <button id="copy-generation-settings" class="settings-button square-button" title="複製">
            <span class="icon">⧉</span>
          </button>
          <button id="delete-generation-settings" class="settings-button square-button" title="刪除">
            <span class="icon">×</span>
          </button>
        </div>

        <div class="tab-container">
          <div class="tab active" data-tab="initial-gen">初始生成</div>
          <div class="tab" data-tab="reflect-1">反思一</div>
          <div class="tab" data-tab="generation-optimize-1">優化一</div>
          <div class="tab" data-tab="reflect-2">反思二</div>
          <div class="tab" data-tab="generation-optimize-2">優化二</div>
          <div class="tab" data-tab="reflect-3">反思三</div>
          <div class="tab" data-tab="generation-optimize-3">優化三</div>
          <div class="tab" data-tab="background">背景知識</div>
        </div>

        <div id="initial-gen-content" class="tab-content active">
          <select id="initialGenModel" class="model-select">
          </select>
          <textarea id="initialGenInstruction" placeholder="輸入初始生成要求"></textarea>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" id="removeHashGen">
              <span>刪除##</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="removeStarGen">
              <span>刪除**</span>
            </label>
          </div>
        </div>

        <div id="reflect-1-content" class="tab-content">
          <select id="reflect1Model" class="model-select">
          </select>
          <textarea id="reflect1Instruction" placeholder="輸入反思一要求"></textarea>
        </div>

        <div id="generation-optimize-1-content" class="tab-content">
          <select id="generationOptimize_1_Model" class="model-select">
          </select>
          <textarea id="generationOptimize_1_Instruction" placeholder="輸入生成優化一要求"></textarea>
        </div>

        <div id="reflect-2-content" class="tab-content">
          <select id="reflect2Model" class="model-select">
          </select>
          <textarea id="reflect2Instruction" placeholder="輸入反思二要求"></textarea>
        </div>

        <div id="generation-optimize-2-content" class="tab-content">
          <select id="generationOptimize_2_Model" class="model-select">
          </select>
          <textarea id="generationOptimize_2_Instruction" placeholder="輸入生成優化二要求"></textarea>
        </div>

        <div id="reflect-3-content" class="tab-content">
          <select id="reflect3Model" class="model-select">
          </select>
          <textarea id="reflect3Instruction" placeholder="輸入反思三要求"></textarea>
        </div>

        <div id="generation-optimize-3-content" class="tab-content">
          <select id="generationOptimize_3_Model" class="model-select">
          </select>
          <textarea id="generationOptimize_3_Instruction" placeholder="輸入生成優化三要求"></textarea>
        </div>

        <div id="background-content" class="tab-content">
          <textarea id="backgroundKnowledge" placeholder="請輸入背景知識，每行一個知識點
例如：
這是一篇關於科技產業的文章
文章主要討論 AI 發展
重點在於 AI 對就業市場的影響"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- 高亮 -->
  <div id="highlight-tab" class="main-tab-content">
    <div class="content">
      <!-- 第一排：底色式（淡色） -->
      <div class="color-picker background-picker">
        <!-- 紅色系 - 調淺了純紅和紅橙 -->
        <div class="color-box" data-color="rgba(255, 71, 71, 0.25)" data-style="background"></div>     <!-- 紅 0° -->
        <div class="color-box" data-color="rgba(255, 99, 71, 0.25)" data-style="background"></div>     <!-- 紅橙 24° -->
        
        <!-- 橙色系 - 調整為更明亮的橙色 -->
        <div class="color-box" data-color="rgba(255, 140, 0, 0.25)" data-style="background"></div>     <!-- 橙 48° -->
        <div class="color-box" data-color="rgba(255, 212, 0, 0.25)" data-style="background"></div>     <!-- 橙黃 72° -->
        
        <!-- 黃色系 - 保持原樣，已經夠亮 -->
        <div class="color-box" data-color="rgba(255, 255, 0, 0.25)" data-style="background"></div>     <!-- 黃 96° -->
        <div class="color-box" data-color="rgba(191, 255, 0, 0.25)" data-style="background"></div>     <!-- 黃綠 120° -->
        
        <!-- 綠色系 - 調整為更明亮的綠色 -->
        <div class="color-box" data-color="rgba(104, 229, 104, 0.25)" data-style="background"></div>     <!-- 綠 144° -->
        <div class="color-box" data-color="rgba(0, 255, 127, 0.25)" data-style="background"></div>     <!-- 青綠 168° -->
        
        <!-- 青色系 - 保持原樣 -->
        <div class="color-box" data-color="rgba(0, 255, 255, 0.25)" data-style="background"></div>     <!-- 青 192° -->
        
        <!-- 藍色系 - 調整為更亮的藍色 -->
        <div class="color-box" data-color="rgba(30, 144, 255, 0.25)" data-style="background"></div>    <!-- 青藍 216° -->
        <div class="color-box" data-color="rgba(65, 105, 225, 0.25)" data-style="background"></div>    <!-- 藍 240° -->
        
        <!-- 紫色系 - 全部調淺 -->
        <div class="color-box" data-color="rgba(147, 112, 219, 0.25)" data-style="background"></div>   <!-- 藍紫 264° -->
        <div class="color-box" data-color="rgba(186, 85, 211, 0.25)" data-style="background"></div>    <!-- 紫 288° -->
        <div class="color-box" data-color="rgba(215, 72, 210, 0.25)" data-style="background"></div>   <!-- 紫紅 312° -->
        <div class="color-box" data-color="rgba(253, 68, 168, 0.25)" data-style="background"></div>    <!-- 紅紫 336° -->
        
        <!-- 第二排：底色式（飽和色） -->
        <!-- 紅色系 - 調淺了純紅和紅橙 -->
        <div class="color-box" data-color="rgba(255, 71, 71, 0.6)" data-style="background"></div>     <!-- 紅 0° -->
        <div class="color-box" data-color="rgba(255, 99, 71, 0.6)" data-style="background"></div>     <!-- 紅橙 24° -->
        
        <!-- 橙色系 - 調整為更明亮的橙色 -->
        <div class="color-box" data-color="rgba(255, 140, 0, 0.6)" data-style="background"></div>     <!-- 橙 48° -->
        <div class="color-box" data-color="rgba(255, 212, 0, 0.6)" data-style="background"></div>     <!-- 橙黃 72° -->
        
        <!-- 黃色系 - 保持原樣，已經夠亮 -->
        <div class="color-box" data-color="rgba(255, 255, 0, 0.6)" data-style="background"></div>     <!-- 黃 96° -->
        <div class="color-box" data-color="rgba(191, 255, 0, 0.6)" data-style="background"></div>     <!-- 黃綠 120° -->
        
        <!-- 綠色系 - 調整為更明亮的綠色 -->
        <div class="color-box" data-color="rgba(104, 229, 104, 0.6)" data-style="background"></div>     <!-- 綠 144° -->
        <div class="color-box" data-color="rgba(0, 255, 127, 0.6)" data-style="background"></div>     <!-- 青綠 168° -->
        
        <!-- 青色系 - 保持原樣 -->
        <div class="color-box" data-color="rgba(0, 255, 255, 0.6)" data-style="background"></div>     <!-- 青 192° -->
        
        <!-- 藍色系 - 調整為更亮的藍色 -->
        <div class="color-box" data-color="rgba(30, 144, 255, 0.5)" data-style="background"></div>    <!-- 青藍 216° -->
        <div class="color-box" data-color="rgba(65, 105, 225, 0.5)" data-style="background"></div>    <!-- 藍 240° -->
        
        <!-- 紫色系 - 全部調淺 -->
        <div class="color-box" data-color="rgba(147, 112, 219, 0.5)" data-style="background"></div>   <!-- 藍紫 264° -->
        <div class="color-box" data-color="rgba(186, 85, 211, 0.5)" data-style="background"></div>    <!-- 紫 288° -->
        <div class="color-box" data-color="rgba(215, 72, 210, 0.5)" data-style="background"></div>   <!-- 紫紅 312° -->
        <div class="color-box" data-color="rgba(253, 68, 168, 0.5)" data-style="background"></div>    <!-- 紅紫 336° -->
      </div>
      
      <!-- 第三排：外框式（飽和色） -->
      <div class="color-picker border-picker">
        <!-- 紅色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(255, 71, 71)" data-style="border"></div>     <!-- 紅 0° -->
        <div class="color-box border-box" data-color="rgb(255, 99, 71)" data-style="border"></div>     <!-- 紅橙 24° -->
        
        <!-- 橙色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(255, 140, 0)" data-style="border"></div>     <!-- 橙 48° -->
        <div class="color-box border-box" data-color="rgb(255, 212, 0)" data-style="border"></div>     <!-- 橙黃 72° -->
        
        <!-- 黃色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(255, 255, 0)" data-style="border"></div>     <!-- 黃 96° -->
        <div class="color-box border-box" data-color="rgb(191, 255, 0)" data-style="border"></div>     <!-- 黃綠 120° -->
        
        <!-- 綠色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(104, 229, 104)" data-style="border"></div>     <!-- 綠 144° -->
        <div class="color-box border-box" data-color="rgb(0, 255, 127)" data-style="border"></div>     <!-- 青綠 168° -->
        
        <!-- 青色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(0, 255, 255)" data-style="border"></div>     <!-- 青 192° -->
        
        <!-- 藍色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(30, 144, 255)" data-style="border"></div>    <!-- 青藍 216° -->
        <div class="color-box border-box" data-color="rgb(65, 105, 225)" data-style="border"></div>    <!-- 藍 240° -->
        
        <!-- 紫色系 - 飽和色 -->
        <div class="color-box border-box" data-color="rgb(147, 112, 219)" data-style="border"></div>   <!-- 藍紫 264° -->
        <div class="color-box border-box" data-color="rgb(186, 85, 211)" data-style="border"></div>    <!-- 紫 288° -->
        <div class="color-box border-box" data-color="rgb(215, 72, 210)" data-style="border"></div>   <!-- 紫紅 312° -->
        <div class="color-box border-box" data-color="rgb(253, 68, 168)" data-style="border"></div>    <!-- 紅紫 336° -->
      </div>
      <div class="highlight-container">
        <div class="highlight-overlay"></div>
        <textarea id="highlight-words" 
                  placeholder="請輸入要高亮的文字，每個文字一行
支援正則表達式，使用 /pattern/ 格式
例如：
營收
產品
年增
消費型
/\d+%/
/Q[1-4]/"></textarea>
      </div>
    </div>
  </div>

  <!-- 替換 -->
  <div id="auto-replace-tab" class="main-tab-content">
    <div class="content">
      <div class="auto-replace-container">
        <!-- 自動替換組會在這裡動態生成 -->
      </div>
    </div>
  </div>

  <!-- 股票 -->
  <div id="stock-tab" class="main-tab-content">
    <div class="content">
      <div class="stock-input-container">
        <textarea id="stock-list-input" placeholder="請輸入股票清單，格式如下：
代碼,公司名稱,匹配模式(可選)
例如：
1101,台泥
1303,南亞,(?<!東)南亞"></textarea>
        <button id="copy-stock-list" class="copy-button" title="複製股票清單">
          <i class="fa-regular fa-copy"></i>
        </button>
      </div>
      
      <div class="stock-crawler-controls">
        <div class="crawler-interval-container">
          <label for="crawler-interval">自動爬取間隔：</label>
          <input type="number" id="crawler-interval" min="0.1" max="9999" step="0.1" value="30" class="interval-input">
          <label for="crawler-interval">分鐘</label>
        </div>
        <div class="crawler-buttons-container">
          <button id="auto-crawl-toggle" class="crawler-button auto-toggle">啟動自動爬取</button>
          <button id="start-crawl" class="crawler-button">立刻爬取</button>
        </div>
      </div>
      
      <div class="crawler-status">
        <div id="progress-container" class="progress-container" style="display: none;">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text">0%</span>
        </div>
        <div id="crawler-status" class="status-text"></div>
      </div>
    </div>
  </div>

  <!-- 同步 -->
  <div id="sync-tab" class="main-tab-content">
    <div class="content">
      <div class="sync-container">
        <div class="sync-section">
          <h3>Google Drive 同步</h3>
          
          <!-- 狀態顯示區域 -->
          <div id="sync-status" class="sync-status-display disconnected">
            <div id="status-icon" class="status-icon disconnected"></div>
            <span id="status-text">未連接</span>
          </div>
          
          <!-- 錯誤訊息 -->
          <div id="sync-error" class="sync-error-message" style="display: none;"></div>
          
          <!-- 控制區域 -->
          <div class="sync-control-row">
            <div class="sync-buttons-group">
              <button id="auth-button" class="sync-control-button google-button auth-button">
                連接 Google Drive
              </button>
              <button id="signout-button" class="sync-control-button google-button signout-button" style="display: none;">
                登出
              </button>
              
              <button id="manual-sync-button" class="sync-control-button manual-sync-button">
                手動同步
              </button>
            </div>
          </div>
          
          <!-- 自動同步開關的新行 -->
          <div class="sync-toggle-row">
            <div class="sync-control-item">
              <span class="control-label">自動同步</span>
              <div id="auto-sync-toggle" class="sync-toggle"></div>
              <div class="sync-interval-container">
                <label for="sync-interval">間隔</label>
                <input type="number" id="sync-interval" min="0.1" max="60" step="0.1" value="2" class="sync-interval-input">
                <label for="sync-interval">分鐘</label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定 -->
  <div id="settings-tab" class="main-tab-content">
    <div class="content">
      <div class="settings-container">
        <div class="settings-section">
          <h3>設定管理</h3>
          <div class="settings-buttons">
            <button id="export-settings" class="settings-button">匯出設定</button>
            <button id="import-settings" class="settings-button">匯入設定</button>
            <button id="cleanup-settings" class="settings-button cleanup-button">清理過時項目</button>
            <input type="file" id="import-file" accept=".json" style="display: none;">
          </div>
        </div>
        
        <div class="settings-section">
          <h3>API 金鑰管理</h3>
          <div class="api-key-section">
            <div class="input-group">
              <select id="model-select">
                <option value="gemini">Gemini API</option>
                <option value="openai">OpenAI</option>
                <option value="google-translate">Google 翻譯</option>
              </select>
              <input type="password" id="api-key" placeholder="輸入您的 API 金鑰">
            </div>
          </div>
          
          <div class="model-management-section">
            <h3>模型管理</h3>
            <div class="add-model-form">
              <div class="form-row">
                <div class="form-group">
                  <input type="text" id="custom-model-name" placeholder="模型名 gemini-2.0-flash" class="form-input">
                </div>
                <div class="form-group">
                  <input type="text" id="custom-model-display" placeholder="顯示名 Gemini 2.0 Flash" class="form-input">
                </div>
                <div class="form-group">
                  <select id="custom-model-type" class="form-input">
                    <option value="">選擇 API</option>
                    <option value="gemini">Gemini API</option>
                    <option value="openai">OpenAI API</option>
                  </select>
                </div>
                <div class="form-group">
                  <button id="add-custom-model" class="add-model-button">新增</button>
                </div>
              </div>
            </div>
            
            <div class="custom-models-list">
              <h5>自定義模型</h5>
              <div id="custom-models-container">
                <!-- 自定義模型列表會在這裡動態生成 -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 首先載入 default.js，因為其他模組需要 LogUtils -->
  <script src="default.js"></script>
  
  <script src="settings/settings-key.js"></script>
  <script src="settings/settings-manager.js"></script>
  <script src="settings/model-manager.js"></script>
  <script src="settings/api-key-manager.js"></script>
  <script src="settings/storage-manager.js"></script>
  <script src="settings/generation-manager.js"></script>
  <!-- 新的設定管理模組 - 按依賴順序載入 -->
  <script src="settings/settings-cleanup.js"></script>
  <script src="settings/settings-classifier.js"></script>
  <script src="settings/settings-exporter.js"></script>
  <script src="settings/settings-importer.js"></script>
  <script src="settings/settings-loader.js"></script>
  <script src="text_replace/replace-manager.js"></script>
  <script src="text_replace/manual-replace-manager.js"></script>
  <script src="text_replace/auto-replace-manager.js"></script>
  <script src="SettingsIO/settings-io.js"></script>
  <script src="settings.js"></script>
  <!-- 翻譯系統模組 - 按依賴順序載入 -->
