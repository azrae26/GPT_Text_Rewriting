<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 翻譯功能測試</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .button {
            background: #007cba;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .button:hover {
            background: #005a87;
        }
        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
    </style>
</head>
<body>
    <h1>Google 翻譯功能測試</h1>
    
    <div class="test-section warning">
        <h3>⚠️ 重要提醒</h3>
        <p>這是一個測試頁面，用於驗證 Google 翻譯功能的基本實現。當前使用<strong>演示模式</strong>，不會進行實際的 API 調用。</p>
    </div>

    <div class="test-section">
        <h3>測試文本</h3>
        <textarea id="testText" placeholder="請輸入要翻譯的文本...">
這是一段測試文本。我們要驗證 Google 翻譯功能是否正常工作。

功能特點包括：
1. 支援大型文本的分批處理
2. 智能文本分割
3. 進度顯示
4. 取消支持

每批最多可以處理 29,000 個字元，這樣可以充分利用 Google Translation API v3 的免費額度。
        </textarea>
    </div>

    <div class="test-section">
        <h3>測試按鈕</h3>
        <button id="translateBtn" class="button">開始翻譯測試</button>
        <button id="cancelBtn" class="button" disabled>取消翻譯</button>
        <button id="clearBtn" class="button">清空文本</button>
    </div>

    <div class="test-section">
        <h3>狀態顯示</h3>
        <div id="status" class="status">準備就緒</div>
    </div>

    <div class="test-section">
        <h3>測試結果</h3>
        <textarea id="resultText" placeholder="翻譯結果會顯示在這裡..." readonly></textarea>
    </div>

    <script>
        // 模擬 Google 翻譯管理器的基本功能
        const mockGoogleTranslateManager = {
            isTranslating: false,
            
            async simulateTranslation(text) {
                const batches = this.splitTextIntoBatches(text);
                const results = [];
                
                for (let i = 0; i < batches.length; i++) {
                    if (!this.isTranslating) break;
                    
                    this.updateStatus(`正在翻譯第 ${i + 1}/${batches.length} 批次...`);
                    
                    // 模擬翻譯延遲
                    await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));
                    
                    // 模擬翻譯結果
                    const translated = `[Google翻譯演示] ${batches[i]}`;
                    results.push(translated);
                }
                
                return results.join('\n');
            },
            
            splitTextIntoBatches(text) {
                const maxLength = 29000;
                const batches = [];
                const paragraphs = text.split('\n');
                let currentBatch = '';
                
                for (const paragraph of paragraphs) {
                    const newBatch = currentBatch ? `${currentBatch}\n${paragraph}` : paragraph;
                    
                    if (newBatch.length <= maxLength) {
                        currentBatch = newBatch;
                    } else {
                        if (currentBatch.trim()) {
                            batches.push(currentBatch.trim());
                        }
                        currentBatch = paragraph;
                    }
                }
                
                if (currentBatch.trim()) {
                    batches.push(currentBatch.trim());
                }
                
                return batches;
            },
            
            updateStatus(message) {
                document.getElementById('status').textContent = message;
            }
        };

        // 綁定事件
        document.getElementById('translateBtn').addEventListener('click', async () => {
            const text = document.getElementById('testText').value;
            if (!text.trim()) {
                alert('請輸入要翻譯的文本');
                return;
            }
            
            mockGoogleTranslateManager.isTranslating = true;
            document.getElementById('translateBtn').disabled = true;
            document.getElementById('cancelBtn').disabled = false;
            
            try {
                mockGoogleTranslateManager.updateStatus('開始翻譯...');
                const result = await mockGoogleTranslateManager.simulateTranslation(text);
                
                if (mockGoogleTranslateManager.isTranslating) {
                    document.getElementById('resultText').value = result;
                    mockGoogleTranslateManager.updateStatus('翻譯完成');
                }
            } catch (error) {
                mockGoogleTranslateManager.updateStatus('翻譯失敗: ' + error.message);
            } finally {
                mockGoogleTranslateManager.isTranslating = false;
                document.getElementById('translateBtn').disabled = false;
                document.getElementById('cancelBtn').disabled = true;
            }
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            mockGoogleTranslateManager.isTranslating = false;
            mockGoogleTranslateManager.updateStatus('翻譯已取消');
            document.getElementById('translateBtn').disabled = false;
            document.getElementById('cancelBtn').disabled = true;
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('testText').value = '';
            document.getElementById('resultText').value = '';
            mockGoogleTranslateManager.updateStatus('準備就緒');
        });
    </script>
</body>
</html>
